<!DOCTYPE html><html class="scroll-smooth" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>My Profile | Elite Run Club</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        "colors": {
          "on-primary": "#ffffff","primary-fixed": "#d7e2ff","outline": "#747781",
          "on-surface-variant": "#434750","on-surface": "#191c1e",
          "surface-container-highest": "#e0e3e5","surface-container": "#eceef0",
          "surface-container-lowest": "#ffffff","surface-container-high": "#e6e8ea",
          "primary": "#00336e","outline-variant": "#c3c6d1",
          "surface-container-low": "#f2f4f6","primary-container": "#244a86",
          "secondary-container": "#75a5ff","background": "#f7f9fb",
          "on-background": "#191c1e","surface": "#f7f9fb","primary-fixed": "#d7e2ff",
          "error": "#ba1a1a","on-error": "#ffffff","error-container": "#ffdad6",
        },
        "fontFamily": { "headline-lg": ["Inter"], "body-md": ["Inter"], "label-md": ["Inter"] },
        "fontSize": {
          "headline-lg": ["32px", {"lineHeight":"40px","fontWeight":"700"}],
          "title-md": ["20px", {"lineHeight":"28px","fontWeight":"600"}],
          "label-md": ["14px", {"lineHeight":"20px","fontWeight":"600"}],
          "body-md": ["16px", {"lineHeight":"24px","fontWeight":"400"}],
        },
        "spacing": { "margin-desktop": "64px", "margin-mobile": "16px" },
      }
    }
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
  .glass-header { background: rgba(255,255,255,0.85); backdrop-filter: blur(8px); }
  .tab-active { border-bottom: 2px solid #00336e; color: #00336e; font-weight: 700; }
  .tab-inactive { border-bottom: 2px solid transparent; color: #434750; }
</style>
</head>
<body class="bg-background text-on-background font-body-md text-body-md overflow-x-hidden">

<!-- Nav -->
<header class="w-full fixed top-0 z-[60] glass-header border-b border-outline-variant/30">
<nav class="flex justify-between items-center px-6 md:px-margin-desktop py-4 max-w-7xl mx-auto">
  <a class="font-headline-lg text-primary tracking-tight flex items-center text-xl font-bold" href="index.html">Elite Run Club</a>
  <div class="hidden lg:flex items-center gap-8">
    <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="index.html">Home</a>
    <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="events.html">Runs &amp; Events</a>
    <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="routes.html">Local Routes</a>
    <a class="text-on-surface-variant font-medium hover:text-primary transition-colors" href="community.html">Community</a>
  </div>
  <div class="flex items-center gap-3">
    <a href="events.html" class="hidden sm:block bg-primary text-on-primary px-5 py-2 rounded-full font-label-md hover:shadow-lg transition-all">Join Next Run</a>
    <button id="nav-logout-btn" onclick="logout()" class="hidden text-on-surface-variant hover:text-primary transition-colors font-label-md px-3 py-2 rounded-full border border-outline-variant">Log out</button>
  </div>
</nav>
</header>

<!-- Auth Wall (shown when logged out) -->
<div id="auth-wall" class="hidden min-h-screen flex items-center justify-center px-4 pt-20">
  <div class="w-full max-w-md">
    <!-- Tabs -->
    <div class="flex mb-6 border-b border-outline-variant">
      <button id="tab-login" onclick="switchTab('login')" class="tab-active flex-1 py-3 text-sm font-semibold transition-colors">Log In</button>
      <button id="tab-register" onclick="switchTab('register')" class="tab-inactive flex-1 py-3 text-sm font-semibold transition-colors">Create Account</button>
    </div>

    <!-- Login Form -->
    <div id="form-login">
      <h1 class="text-2xl font-bold text-on-surface mb-6">Welcome back</h1>
      <input id="login-email" type="email" placeholder="Email address"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <input id="login-password" type="password" placeholder="Password"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <button onclick="login()" class="w-full bg-primary text-on-primary rounded-full py-3 font-semibold hover:shadow-lg transition-all">Log In</button>
      <p id="login-err" class="mt-3 text-sm text-center text-error"></p>
    </div>

    <!-- Register Form -->
    <div id="form-register" class="hidden">
      <h1 class="text-2xl font-bold text-on-surface mb-6">Join the club</h1>
      <input id="reg-name" type="text" placeholder="Full name"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <input id="reg-email" type="email" placeholder="Email address"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <input id="reg-phone" type="tel" placeholder="Phone number (optional)"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <input id="reg-password" type="password" placeholder="Password (min 6 characters)"
        class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
      <button onclick="register()" class="w-full bg-primary text-on-primary rounded-full py-3 font-semibold hover:shadow-lg transition-all">Create Account</button>
      <p id="reg-err" class="mt-3 text-sm text-center text-error"></p>
    </div>
  </div>
</div>

<!-- Profile Page (shown when logged in) -->
<div id="profile-page" class="hidden min-h-screen pt-24 pb-16 px-4 md:px-margin-desktop max-w-5xl mx-auto">

  <!-- Header card -->
  <div class="bg-surface-container-lowest rounded-[24px] border border-outline-variant/30 p-8 mb-8 flex flex-col sm:flex-row items-center sm:items-start gap-6">
    <!-- Avatar -->
    <div class="relative shrink-0">
      <img id="profile-avatar" src="/uploads/avatars/default.png" onerror="this.src='https://ui-avatars.com/api/?name=Member&background=d7e2ff&color=00336e&size=128'"
        class="w-24 h-24 rounded-full object-cover border-4 border-primary-fixed">
      <label for="avatar-input" class="absolute -bottom-1 -right-1 w-8 h-8 bg-primary text-on-primary rounded-full flex items-center justify-center cursor-pointer hover:opacity-90 transition-opacity shadow-md">
        <span class="material-symbols-outlined text-sm" style="font-variation-settings:'FILL' 1;">photo_camera</span>
      </label>
      <input id="avatar-input" type="file" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
    </div>
    <!-- Name + meta -->
    <div class="flex-1 text-center sm:text-left">
      <h1 id="profile-name" class="text-2xl font-bold text-on-surface mb-1">—</h1>
      <p id="profile-email" class="text-on-surface-variant text-sm mb-1">—</p>
      <p id="profile-joined" class="text-on-surface-variant text-xs">—</p>
    </div>
    <button onclick="openEditModal()" class="shrink-0 border border-outline-variant text-on-surface-variant hover:border-primary hover:text-primary transition-colors px-5 py-2 rounded-full text-sm font-semibold flex items-center gap-2">
      <span class="material-symbols-outlined text-sm">edit</span> Edit Profile
    </button>
  </div>

  <!-- Tabs -->
  <div class="flex border-b border-outline-variant mb-8">
    <button onclick="showTab('upcoming')" id="tab-upcoming" class="tab-active py-3 px-6 text-sm transition-colors">Upcoming Runs</button>
    <button onclick="showTab('past')" id="tab-past" class="tab-inactive py-3 px-6 text-sm transition-colors">Past Runs</button>
  </div>

  <!-- Upcoming Runs -->
  <div id="section-upcoming">
    <div id="upcoming-list" class="space-y-4"></div>
    <p id="upcoming-empty" class="hidden text-center text-on-surface-variant py-16">
      You haven't joined any upcoming runs yet.<br>
      <a href="/events" class="text-primary font-semibold hover:underline">Browse events →</a>
    </p>
  </div>

  <!-- Past Runs -->
  <div id="section-past" class="hidden">
    <div id="past-list" class="space-y-4"></div>
    <p id="past-empty" class="hidden text-center text-on-surface-variant py-16">No past runs yet — your history will appear here.</p>
  </div>

</div>

<!-- Edit Profile Modal -->
<div id="edit-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[999] px-4">
  <div class="bg-white rounded-[20px] p-8 w-full max-w-md relative">
    <button onclick="closeEditModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-on-surface">
      <span class="material-symbols-outlined">close</span>
    </button>
    <h2 class="text-xl font-bold text-on-surface mb-6">Edit Profile</h2>
    <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1">Full Name</label>
    <input id="edit-name" type="text" class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
    <label class="block text-xs font-semibold text-on-surface-variant uppercase tracking-wider mb-1">Phone</label>
    <input id="edit-phone" type="tel" class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-6 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
    <button onclick="saveProfile()" class="w-full bg-primary text-on-primary rounded-full py-3 font-semibold hover:shadow-lg transition-all mb-3">Save Changes</button>
    <button onclick="openPasswordModal(); closeEditModal()" class="w-full text-primary border border-primary rounded-full py-3 font-semibold hover:bg-primary-fixed transition-all text-sm">Change Password</button>
    <p id="edit-msg" class="mt-3 text-sm text-center"></p>
  </div>
</div>

<!-- Change Password Modal -->
<div id="password-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-[999] px-4">
  <div class="bg-white rounded-[20px] p-8 w-full max-w-md relative">
    <button onclick="closePasswordModal()" class="absolute top-4 right-4 text-on-surface-variant hover:text-on-surface">
      <span class="material-symbols-outlined">close</span>
    </button>
    <h2 class="text-xl font-bold text-on-surface mb-6">Change Password</h2>
    <input id="pw-current" type="password" placeholder="Current password" class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-3 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
    <input id="pw-new" type="password" placeholder="New password (min 6 characters)" class="w-full border border-outline-variant rounded-xl px-4 py-3 mb-4 text-sm focus:outline-none focus:ring-2 focus:ring-primary bg-surface">
    <button onclick="changePassword()" class="w-full bg-primary text-on-primary rounded-full py-3 font-semibold hover:shadow-lg transition-all">Update Password</button>
    <p id="pw-msg" class="mt-3 text-sm text-center"></p>
  </div>
</div>

<script>
const API = '';
let token = localStorage.getItem('erc_token');
let currentUser = null;

// ── Init ──────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  if (token) loadProfile();
  else showAuthWall();
});

function showAuthWall() {
  document.getElementById('auth-wall').classList.remove('hidden');
  document.getElementById('profile-page').classList.add('hidden');
}

function showProfilePage() {
  document.getElementById('auth-wall').classList.add('hidden');
  document.getElementById('profile-page').classList.remove('hidden');
  document.getElementById('nav-logout-btn').classList.remove('hidden');
}

// ── Auth tab switch ───────────────────────────────────────────────────
function switchTab(tab) {
  document.getElementById('form-login').classList.toggle('hidden', tab !== 'login');
  document.getElementById('form-register').classList.toggle('hidden', tab !== 'register');
  document.getElementById('tab-login').className = tab === 'login' ? 'tab-active flex-1 py-3 text-sm font-semibold transition-colors' : 'tab-inactive flex-1 py-3 text-sm font-semibold transition-colors';
  document.getElementById('tab-register').className = tab === 'register' ? 'tab-active flex-1 py-3 text-sm font-semibold transition-colors' : 'tab-inactive flex-1 py-3 text-sm font-semibold transition-colors';
}

// ── Login ─────────────────────────────────────────────────────────────
async function login() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-err');
  err.textContent = '';

  try {
    const res = await fetch(`${API}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; return; }

    token = data.token;
    localStorage.setItem('erc_token', token);
    renderProfile(data.user);
    loadRuns();
    showProfilePage();
  } catch(e) {
    err.textContent = 'Something went wrong. Try again.';
  }
}

// ── Register ──────────────────────────────────────────────────────────
async function register() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const phone = document.getElementById('reg-phone').value.trim();
  const password = document.getElementById('reg-password').value;
  const err = document.getElementById('reg-err');
  err.textContent = '';

  try {
    const res = await fetch(`${API}/api/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, phone, password })
    });
    const data = await res.json();
    if (!res.ok) { err.textContent = data.error; return; }

    token = data.token;
    localStorage.setItem('erc_token', token);
    renderProfile(data.user);
    loadRuns();
    showProfilePage();
  } catch(e) {
    err.textContent = 'Something went wrong. Try again.';
  }
}

// ── Load profile ──────────────────────────────────────────────────────
async function loadProfile() {
  try {
    const res = await fetch(`${API}/api/profile`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    currentUser = data;
    renderProfile(data);
    loadRuns();
    showProfilePage();
  } catch(e) {
    showAuthWall();
  }
}

function renderProfile(user) {
  currentUser = user;
  document.getElementById('profile-name').textContent = user.name;
  document.getElementById('profile-email').textContent = user.email;
  document.getElementById('profile-joined').textContent = `Member since ${new Date(user.joined_at).toLocaleDateString('en-IN', { month: 'long', year: 'numeric' })}`;
  if (user.avatar) {
    document.getElementById('profile-avatar').src = user.avatar;
  }
}

// ── Load runs ─────────────────────────────────────────────────────────
async function loadRuns() {
  try {
    const res = await fetch(`${API}/api/profile/runs`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const { upcoming, past } = await res.json();
    renderRuns('upcoming-list', 'upcoming-empty', upcoming);
    renderRuns('past-list', 'past-empty', past);
  } catch(e) {
    console.error('Failed to load runs', e);
  }
}

function renderRuns(listId, emptyId, runs) {
  const list = document.getElementById(listId);
  const empty = document.getElementById(emptyId);
  if (!runs.length) {
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');
  list.innerHTML = runs.map(r => {
    const date = new Date(r.date).toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const isPast = r.status === 'past';
    return `
    <div class="flex items-center gap-5 bg-surface-container-lowest rounded-[16px] border border-outline-variant/30 p-5 hover:shadow-sm transition-all">
      <div class="w-12 h-12 rounded-2xl ${isPast ? 'bg-surface-container-high' : 'bg-primary-fixed'} flex items-center justify-center shrink-0">
        <span class="material-symbols-outlined ${isPast ? 'text-outline' : 'text-primary'}" style="font-variation-settings:'FILL' 1;">directions_run</span>
      </div>
      <div class="flex-1 min-w-0">
        <p class="font-semibold text-on-surface truncate">${r.title}</p>
        <p class="text-sm text-on-surface-variant">${date} · ${r.time}</p>
        <p class="text-sm text-on-surface-variant truncate">${r.location}</p>
      </div>
      <div class="text-right shrink-0">
        ${r.distance_km ? `<p class="text-sm font-semibold text-primary">${r.distance_km} km</p>` : ''}
        <span class="text-xs px-2 py-0.5 rounded-full ${isPast ? 'bg-surface-container text-on-surface-variant' : 'bg-primary-fixed text-primary'} font-semibold">${r.difficulty}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Section tabs ──────────────────────────────────────────────────────
function showTab(tab) {
  document.getElementById('section-upcoming').classList.toggle('hidden', tab !== 'upcoming');
  document.getElementById('section-past').classList.toggle('hidden', tab !== 'past');
  document.getElementById('tab-upcoming').className = tab === 'upcoming' ? 'tab-active py-3 px-6 text-sm transition-colors' : 'tab-inactive py-3 px-6 text-sm transition-colors';
  document.getElementById('tab-past').className = tab === 'past' ? 'tab-active py-3 px-6 text-sm transition-colors' : 'tab-inactive py-3 px-6 text-sm transition-colors';
}

// ── Edit profile modal ────────────────────────────────────────────────
function openEditModal() {
  document.getElementById('edit-name').value = currentUser?.name || '';
  document.getElementById('edit-phone').value = currentUser?.phone || '';
  document.getElementById('edit-msg').textContent = '';
  document.getElementById('edit-modal').classList.remove('hidden');
}
function closeEditModal() { document.getElementById('edit-modal').classList.add('hidden'); }

async function saveProfile() {
  const name = document.getElementById('edit-name').value.trim();
  const phone = document.getElementById('edit-phone').value.trim();
  const msg = document.getElementById('edit-msg');
  msg.textContent = '';

  try {
    const res = await fetch(`${API}/api/profile`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ name, phone })
    });
    const data = await res.json();
    if (!res.ok) { msg.style.color = 'red'; msg.textContent = data.error; return; }
    renderProfile(data);
    msg.style.color = '#00336e';
    msg.textContent = 'Saved!';
    setTimeout(closeEditModal, 800);
  } catch(e) {
    msg.style.color = 'red'; msg.textContent = 'Failed to save.';
  }
}

// ── Password modal ────────────────────────────────────────────────────
function openPasswordModal() {
  document.getElementById('pw-current').value = '';
  document.getElementById('pw-new').value = '';
  document.getElementById('pw-msg').textContent = '';
  document.getElementById('password-modal').classList.remove('hidden');
}
function closePasswordModal() { document.getElementById('password-modal').classList.add('hidden'); }

async function changePassword() {
  const current_password = document.getElementById('pw-current').value;
  const new_password = document.getElementById('pw-new').value;
  const msg = document.getElementById('pw-msg');

  try {
    const res = await fetch(`${API}/api/profile/password`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ current_password, new_password })
    });
    const data = await res.json();
    msg.style.color = res.ok ? '#00336e' : 'red';
    msg.textContent = data.message || data.error;
    if (res.ok) setTimeout(closePasswordModal, 1000);
  } catch(e) {
    msg.style.color = 'red'; msg.textContent = 'Failed to update password.';
  }
}

// ── Avatar upload ─────────────────────────────────────────────────────
async function uploadAvatar(event) {
  const file = event.target.files[0];
  if (!file) return;

  const formData = new FormData();
  formData.append('avatar', file);

  try {
    const res = await fetch(`${API}/api/profile/avatar`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData
    });
    const data = await res.json();
    if (res.ok) {
      document.getElementById('profile-avatar').src = data.avatar + '?t=' + Date.now();
    } else {
      alert(data.error);
    }
  } catch(e) {
    alert('Failed to upload photo.');
  }
}

// ── Logout ────────────────────────────────────────────────────────────
function logout() {
  localStorage.removeItem('erc_token');
  token = null;
  currentUser = null;
  document.getElementById('nav-logout-btn').classList.add('hidden');
  showAuthWall();
}
</script>
</body>
</html>
